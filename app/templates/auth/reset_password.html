{% extends "base.html" %}
{% block title %}Set New Password – TalentPortal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock-fill display-4 text-success"></i>
          <h3 class="fw-bold mt-2">Set New Password</h3>
        </div>

        {% if errors %}
        <div class="alert alert-danger">
          <ul class="mb-0 ps-3">
            {% for error in errors %}<li>{{ error }}</li>{% endfor %}
          </ul>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="Min 8 chars, 1 uppercase, 1 digit" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                     placeholder="Repeat password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 fw-bold">
            <i class="bi bi-check-circle me-1"></i>Update Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
